<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids' Chance NH — Raffle HQ</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #3A68BE; --blue-light: #EBF1FB; --blue-dark: #2A4F9A;
    --green: #3DAA35; --green-light: #E8F7E7; --green-dark: #2D8228;
    --black: #111827; --gray-900: #1F2937; --gray-700: #374151;
    --gray-500: #6B7280; --gray-300: #D1D5DB; --gray-100: #F3F4F6;
    --gray-50: #F9FAFB; --white: #FFFFFF; --gold: #D97706;
    --radius: 14px; --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
    --shadow-md: 0 4px 12px rgba(0,0,0,.10), 0 8px 32px rgba(0,0,0,.08);
    --shadow-lg: 0 12px 40px rgba(0,0,0,.14);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--gray-50); color: var(--black); min-height: 100vh; }

  /* PASSWORD GATE */
  #pw-gate {
    position: fixed; inset: 0; background: var(--gray-50);
    display: flex; align-items: center; justify-content: center; z-index: 9999; padding: 24px;
  }
  #pw-gate .pw-card {
    background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow-lg);
    border: 1.5px solid var(--gray-100); padding: 36px 28px 32px;
    width: 100%; max-width: 360px; text-align: center;
  }
  #pw-gate img { height: 52px; margin-bottom: 20px; object-fit: contain; }
  #pw-gate h2 { font-size: 18px; font-weight: 700; color: var(--black); margin-bottom: 6px; }
  #pw-gate p { font-size: 13px; color: var(--gray-500); margin-bottom: 20px; }
  #pw-gate input {
    width: 100%; padding: 13px 16px; border: 1.5px solid var(--gray-300);
    border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif;
    font-size: 20px; text-align: center; letter-spacing: .15em;
    outline: none; margin-bottom: 12px; transition: border-color .15s;
  }
  #pw-gate input:focus { border-color: var(--blue); }
  #pw-gate input.shake { animation: shake .3s ease; border-color: #EF4444; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  #pw-error { font-size: 13px; color: #EF4444; font-weight: 600; min-height: 18px; margin-bottom: 8px; }

  /* APP */
  #app { display: none; }
  .app-header {
    background: var(--white); border-bottom: 2px solid var(--gray-100);
    padding: 18px 24px 14px; text-align: center; position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,.06);
  }
  .app-header img { height: 52px; object-fit: contain; }
  .app-header .subtitle { font-size: 12px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--green); margin-top: 4px; }

  .tab-bar { display: flex; background: var(--white); border-bottom: 2px solid var(--gray-100); padding: 0 20px; gap: 4px; overflow-x: auto; }
  .tab-btn { flex: 1; min-width: 80px; padding: 14px 8px 12px; border: none; background: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; color: var(--gray-500); border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all .18s; display: flex; align-items: center; justify-content: center; gap: 6px; white-space: nowrap; }
  .tab-btn:hover { color: var(--blue); }
  .tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }
  .tab-btn .tab-icon { font-size: 16px; }

  .panel { display: none; padding: 20px 16px 40px; max-width: 640px; margin: 0 auto; }
  .panel.active { display: block; }

  .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .stat-card { background: var(--white); border-radius: var(--radius); padding: 16px 12px 14px; text-align: center; box-shadow: var(--shadow); border: 1.5px solid var(--gray-100); }
  .stat-card .stat-val { font-size: 26px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
  .stat-card .stat-label { font-size: 11px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--gray-500); }
  .stat-card.blue .stat-val { color: var(--blue); }
  .stat-card.green .stat-val { color: var(--green); }
  .stat-card.gold .stat-val { color: var(--gold); }

  .section-header { font-size: 13px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--gray-500); margin-bottom: 12px; margin-top: 24px; }
  .section-header:first-of-type { margin-top: 0; }

  .card { background: var(--white); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); border: 1.5px solid var(--gray-100); margin-bottom: 14px; }

  .pkg-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .pkg-btn { padding: 14px 10px; border-radius: var(--radius-sm); border: 2px solid #E5E7EB; background: var(--gray-50); cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 15px; color: var(--gray-700); text-align: center; transition: all .18s; }
  .pkg-btn:hover, .pkg-btn.selected { border-color: var(--blue); background: var(--blue-light); color: var(--blue); }
  .pkg-btn .pkg-sub { display: block; font-size: 11px; font-weight: 600; letter-spacing: .04em; color: var(--green); margin-top: 2px; }
  .pkg-btn.selected .pkg-sub { color: var(--blue-dark); }

  .field-group { margin-bottom: 14px; }
  .field-group label { display: block; font-size: 12px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: var(--gray-500); margin-bottom: 6px; }
  .field-group input { width: 100%; padding: 12px 14px; border: 1.5px solid var(--gray-300); border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--black); background: var(--white); transition: border-color .15s; outline: none; }
  .field-group input:focus { border-color: var(--blue); }
  .field-group input::placeholder { color: var(--gray-300); }

  .ticket-range-row { display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: center; }
  .ticket-range-row .arrow { font-size: 18px; color: var(--gray-300); text-align: center; font-weight: 700; }

  .btn { width: 100%; padding: 14px; border: none; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: all .18s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-blue { background: var(--blue); color: var(--white); }
  .btn-blue:hover { background: var(--blue-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(58,104,190,.3); }
  .btn-green { background: var(--green); color: var(--white); }
  .btn-green:hover { background: var(--green-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(61,170,53,.3); }

  .lookup-input-wrap { position: relative; margin-bottom: 16px; }
  .lookup-input-wrap input { width: 100%; padding: 16px 18px; border: 2px solid var(--gray-300); border-radius: var(--radius); font-family: 'DM Mono', monospace; font-size: 28px; font-weight: 500; color: var(--black); text-align: center; letter-spacing: .08em; outline: none; transition: border-color .15s; background: var(--white); }
  .lookup-input-wrap input:focus { border-color: var(--blue); }

  .winner-box { border-radius: var(--radius); padding: 28px 20px; text-align: center; display: none; margin-top: 4px; animation: popIn .22s ease; }
  @keyframes popIn { from{opacity:0;transform:scale(.95)} to{opacity:1;transform:scale(1)} }
  .winner-box.found { display: block; background: linear-gradient(135deg,#E8F7E7,#d4f1d3); border: 2px solid var(--green); }
  .winner-box.not-found { display: block; background: var(--gray-100); border: 2px solid var(--gray-300); }
  .winner-box .winner-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--green); color: var(--white); font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; padding: 5px 12px; border-radius: 100px; margin-bottom: 14px; }
  .winner-box .winner-name { font-size: 32px; font-weight: 700; color: var(--green-dark); margin-bottom: 6px; line-height: 1.2; }
  .winner-box .winner-phone { font-family: 'DM Mono', monospace; font-size: 18px; color: var(--gray-700); margin-bottom: 8px; }
  .winner-box .winner-tickets { font-size: 13px; color: var(--gray-500); font-weight: 500; }
  .winner-box .not-found-text { font-size: 15px; color: var(--gray-500); font-weight: 500; }

  .ledger-list { display: flex; flex-direction: column; gap: 10px; }
  .ledger-item { background: var(--white); border-radius: var(--radius); padding: 14px 16px; border: 1.5px solid var(--gray-100); box-shadow: var(--shadow); display: flex; justify-content: space-between; align-items: center; gap: 12px; }
  .ledger-item .li-info { flex: 1; min-width: 0; }
  .ledger-item .li-name { font-size: 15px; font-weight: 700; color: var(--black); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ledger-item .li-phone { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--gray-500); margin-top: 2px; }
  .ledger-item .li-meta { text-align: right; flex-shrink: 0; }
  .ledger-item .li-range { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--blue); font-weight: 600; }
  .ledger-item .li-count { font-size: 11px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: #9CA3AF; margin-top: 2px; }
  .ledger-item .li-price { font-size: 13px; font-weight: 700; color: var(--gold); margin-top: 2px; }
  .del-btn { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid #E5E7EB; background: var(--white); color: #9CA3AF; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .15s; }
  .del-btn:hover { background: #FEE2E2; border-color: #FCA5A5; color: #EF4444; }

  .empty-state { text-align: center; padding: 48px 20px; color: #9CA3AF; }
  .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; font-weight: 500; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--black); color: var(--white); padding: 12px 20px; border-radius: 100px; font-size: 14px; font-weight: 600; z-index: 999; transition: transform .22s ease; white-space: nowrap; max-width: 90vw; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { background: var(--green-dark); }
  .toast.error { background: #DC2626; }

  .divider { display: flex; align-items: center; gap: 10px; margin: 16px 0; color: #9CA3AF; font-size: 12px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #E5E7EB; }

  .overlap-warning { background: #FEF3C7; border: 1.5px solid #FCD34D; border-radius: var(--radius-sm); padding: 10px 14px; font-size: 13px; font-weight: 600; color: #92400E; margin-top: -8px; margin-bottom: 12px; display: none; }
</style>
</head>

AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA/9k=" alt="Kids' Chance NH">
    <div class="subtitle">Raffle Headquarters</div>
  </header>

  <nav class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('sell',this)"><span class="tab-icon">🎟️</span> Sell</button>
    <button class="tab-btn" onclick="switchTab('lookup',this)"><span class="tab-icon">🔍</span> Lookup</button>
    <button class="tab-btn" onclick="switchTab('ledger',this)"><span class="tab-icon">📋</span> Ledger</button>
  </nav>

  <!-- SELL -->
  <div id="panel-sell" class="panel active">
    <div class="stats-row">
      <div class="stat-card blue"><div class="stat-val" id="stat-buyers">0</div><div class="stat-label">Buyers</div></div>
      <div class="stat-card green"><div class="stat-val" id="stat-tickets">0</div><div class="stat-label">Tickets Sold</div></div>
      <div class="stat-card gold"><div class="stat-val" id="stat-revenue">$0</div><div class="stat-label">Total Sales</div></div>
    </div>
    <div class="card">
      <div class="section-header">Buyer Info</div>
      <div class="field-group"><label>Name</label><input type="text" id="buyer-name" placeholder="Full name" autocomplete="off"></div>
      <div class="field-group"><label>Phone</label><input type="tel" id="buyer-phone" placeholder="(555) 000-0000" autocomplete="off"></div>
      <div class="section-header">Ticket Package</div>
      <div class="pkg-row">
        <button class="pkg-btn" id="pkg-5" onclick="selectPackage(5,10)">5 Tickets<span class="pkg-sub">$10.00</span></button>
        <button class="pkg-btn" id="pkg-15" onclick="selectPackage(15,20)">15 Tickets<span class="pkg-sub">$20.00</span></button>
      </div>
      <div class="divider">or enter custom range</div>
      <div class="section-header">Ticket Numbers</div>
      <div class="ticket-range-row">
        <div class="field-group" style="margin-bottom:0"><label>Start #</label><input type="number" id="ticket-start" placeholder="0001" min="0" oninput="clearPkg();checkOverlap()"></div>
        <div class="arrow">→</div>
        <div class="field-group" style="margin-bottom:0"><label>End #</label><input type="number" id="ticket-end" placeholder="0020" min="0" oninput="clearPkg();checkOverlap()"></div>
      </div>
      <div id="overlap-warning" class="overlap-warning">⚠️ These ticket numbers overlap with an existing sale.</div>
      <div style="margin-top:14px">
        <div class="field-group"><label>Amount Paid ($)</label><input type="number" id="ticket-amount" placeholder="0.00" min="0" step="0.01"></div>
      </div>
      <button class="btn btn-green" onclick="recordSale()">✅ Record Sale</button>
    </div>
  </div>

  <!-- LOOKUP -->
  <div id="panel-lookup" class="panel">
    <div class="card">
      <div class="section-header">Enter Ticket Number</div>
      <div class="lookup-input-wrap"><input type="number" id="lookup-input" placeholder="0000" oninput="lookupTicket()" min="0"></div>
      <button class="btn btn-blue" onclick="lookupTicket()">🔍 Find Winner</button>
    </div>
    <div id="winner-result"></div>
  </div>

  <!-- LEDGER -->
  <div id="panel-ledger" class="panel">
    <div id="ledger-list" class="ledger-list"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// PASSWORD
const PASSWORD = '1988';
function checkPw() {
  const val = document.getElementById('pw-input').value;
  if (val === PASSWORD) {
    document.getElementById('pw-gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    sessionStorage.setItem('kc_auth', '1');
  } else {
    const inp = document.getElementById('pw-input');
    document.getElementById('pw-error').textContent = 'Incorrect password. Try again.';
    inp.classList.add('shake');
    inp.value = '';
    setTimeout(() => inp.classList.remove('shake'), 400);
  }
}
// Auto-unlock if already authenticated this session
if (sessionStorage.getItem('kc_auth') === '1') {
  document.getElementById('pw-gate').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

// DATA
let sales = JSON.parse(localStorage.getItem('kc_sales') || '[]');
function save() { localStorage.setItem('kc_sales', JSON.stringify(sales)); updateStats(); renderLedger(); }

// TABS
function switchTab(tab, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  btn.classList.add('active');
  if (tab === 'ledger') renderLedger();
  if (tab === 'lookup') { document.getElementById('winner-result').innerHTML = ''; document.getElementById('lookup-input').value = ''; }
}

// STATS
function updateStats() {
  document.getElementById('stat-buyers').textContent = sales.length;
  document.getElementById('stat-tickets').textContent = sales.reduce((s,r) => s + (r.end - r.start + 1), 0);
  document.getElementById('stat-revenue').textContent = '$' + sales.reduce((s,r) => s + (r.amount||0), 0).toFixed(0);
}

// PACKAGE
let selPkg = null;
function selectPackage(count, price) {
  selPkg = {count, price};
  document.querySelectorAll('.pkg-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('pkg-' + count).classList.add('selected');
  let nextStart = sales.length ? Math.max(...sales.map(s => s.end)) + 1 : 1;
  document.getElementById('ticket-start').value = nextStart;
  document.getElementById('ticket-end').value = nextStart + count - 1;
  document.getElementById('ticket-amount').value = price.toFixed(2);
  checkOverlap();
}
function clearPkg() { selPkg = null; document.querySelectorAll('.pkg-btn').forEach(b => b.classList.remove('selected')); }

// OVERLAP
function checkOverlap() {
  const start = parseInt(document.getElementById('ticket-start').value);
  const end = parseInt(document.getElementById('ticket-end').value);
  const w = document.getElementById('overlap-warning');
  if (isNaN(start)||isNaN(end)) { w.style.display='none'; return; }
  w.style.display = sales.some(s => !(end < s.start || start > s.end)) ? 'block' : 'none';
}

// RECORD SALE
function recordSale() {
  const name = document.getElementById('buyer-name').value.trim();
  const phone = document.getElementById('buyer-phone').value.trim();
  const start = parseInt(document.getElementById('ticket-start').value);
  const end = parseInt(document.getElementById('ticket-end').value);
  const amount = parseFloat(document.getElementById('ticket-amount').value) || 0;
  if (!name) { showToast('Enter a buyer name.', 'error'); return; }
  if (isNaN(start)||isNaN(end)||end<start) { showToast('Enter valid ticket numbers.', 'error'); return; }
  if (sales.some(s => !(end < s.start || start > s.end))) { showToast('Those tickets are already assigned!', 'error'); return; }
  sales.push({id: Date.now(), name, phone, start, end, amount});
  save();
  document.getElementById('buyer-name').value = '';
  document.getElementById('buyer-phone').value = '';
  document.getElementById('ticket-start').value = '';
  document.getElementById('ticket-end').value = '';
  document.getElementById('ticket-amount').value = '';
  document.getElementById('overlap-warning').style.display = 'none';
  clearPkg();
  showToast('Sale recorded! 🎟️', 'success');
}

// LOOKUP
function lookupTicket() {
  const num = parseInt(document.getElementById('lookup-input').value);
  const box = document.getElementById('winner-result');
  if (isNaN(num)) { box.innerHTML = ''; return; }
  const m = sales.find(s => num >= s.start && num <= s.end);
  if (m) {
    const c = m.end - m.start + 1;
    box.innerHTML = `<div class="winner-box found"><div class="winner-badge">🏆 Winner Found</div><div class="winner-name">${esc(m.name)}</div>${m.phone?`<div class="winner-phone">${esc(m.phone)}</div>`:''}<div class="winner-tickets">Tickets #${m.start} – #${m.end} · ${c} ticket${c!==1?'s':''}</div></div>`;
  } else {
    box.innerHTML = `<div class="winner-box not-found"><div class="not-found-text">🎫 Ticket #${num} not found in records.</div></div>`;
  }
}

// LEDGER
function renderLedger() {
  const el = document.getElementById('ledger-list');
  if (!sales.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">🎟️</div><p>No sales recorded yet.</p></div>'; return; }
  el.innerHTML = [...sales].reverse().map(s => {
    const c = s.end - s.start + 1;
    return `<div class="ledger-item"><div class="li-info"><div class="li-name">${esc(s.name)}</div>${s.phone?`<div class="li-phone">${esc(s.phone)}</div>`:''}</div><div class="li-meta"><div class="li-range">#${s.start} – #${s.end}</div><div class="li-count">${c} ticket${c!==1?'s':''}</div>${s.amount?`<div class="li-price">$${s.amount.toFixed(2)}</div>`:''}</div><button class="del-btn" onclick="deleteSale(${s.id})" title="Delete">✕</button></div>`;
  }).join('');
}
function deleteSale(id) {
  if (!confirm('Remove this sale?')) return;
  sales = sales.filter(s => s.id !== id);
  save(); showToast('Sale removed.', '');
}

// TOAST
let tt;
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(tt);
  tt = setTimeout(() => { t.className = 'toast'; }, 2800);
}

function esc(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

updateStats();
renderLedger();
</script>
</body>
</html>
